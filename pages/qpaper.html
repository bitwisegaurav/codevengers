<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/icon1.png" type="image/x-icon">
    <link rel="stylesheet" href="qpaper.css">
    <title>Question Paper - Codevengers</title>
</head>
<body>
    <nav></nav>
    <main>
        <h1><subject>Computer Graphics</subject> <year>2019</year> Question Paper</h1>
        <div class="container">
            <embed src="E-Commerce(6th)May2021.pdf" type="application/pdf" width="100%" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" class="embed-pdf"/>
        </div>
    </main>
</body>
<script>

    function getUrlValues() {
        const url = new URL(window.location.href);
        const course = url.searchParams.get("course");
        const subject = url.searchParams.get("subject");
        const year = Number(url.searchParams.get("year"));

        return {course, subject, year};
    }

    function setValues (data) {
        const subject = document.querySelector('subject');
        const year = document.querySelector('year');

        subject.innerHTML = data.subject.toUpperCase() || "No Subject";
        year.innerHTML = data.year || "without year";

        const embedpdf = document.querySelector('.embed-pdf');
        embedpdf.setAttribute("src", `../question-papers/${data.course.toLowerCase()}/${data.year}/${data.subject.toLowerCase()}.pdf`);
    }


    window.addEventListener("DOMContentLoaded", async () => {
        const data = getUrlValues();
        setValues(data);
    })
</script>
</html>
