<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/icon1.png" type="image/x-icon">
    <link rel="stylesheet" href="../common_files/editArticle.css">
    <title>Edit Article - Codevengers</title>
</head>
<body>
    <nav></nav>
    <main>
        <div class="container">
            <div class="upper">
                <h1 class="title">Edit Article</h1>
            </div>
            <div class="lower">
                <div class="content">
                    <form action="" method="POST">
                        <label for="title">Title</label>
                        <input type="text" name="title" id="title" placeholder="Enter your title" required>
                        <label for="content">Content</label>
                        <textarea name="content" id="content" cols="30" rows="10" placeholder="Enter your content" required></textarea>
                        <button type="submit">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
