<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="../common_files/courses.css">

<body>
    <nav></nav>

                        <a href="#">

                            <div class="title">Javascript</div>
                        </a>
                        <button type="button" class="remove">&minus;</button>
                    </div>
                    <div class="course">
                        <a href="#">
                            <div class="image">
                                <img src="../images/js.png" alt="js image">
                            </div>
                            <div class="title">Javascript</div>
                        </a>
                        <button type="button">+</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

</html>
