<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="../images/icon1.png" type="image/x-icon">
    <link rel="stylesheet" href="../common_files/settings.css" />
    <title>Settings</title>
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <h2>Settings</h2>
            <ul>
                <li><a href="#edit-data" id="editUser" class="active">Edit Data</a></li>
                <!-- Add more options if needed -->
            </ul>
        </nav>
        <main class="content">
            <div class="innerContent">
                <article id="user-details">
                    <section id="edit-data">
                        <h2>Edit Data</h2>
                        <form action="#" method="POST">
                            <label for="username">Username:</label>
                            <input type="text" id="username" name="username" placeholder="Enter your username" required />
                            <label for="name">Name:</label>
                            <input type="text" id="name" name="name" placeholder="Enter your name" required />
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" placeholder="Enter your email" required />
                            <button type="submit">Save Changes</button>
                        </form>
                    </section>
                    <div class="change-avatar">
                        <div class="image">
                            <img src="http://res.cloudinary.com/dujd69tub/image/upload/v1709444868/sf25kufqpcrur6ccxgqn.jpg" alt="">
                        </div>
                    </div>
                </article>
                <section id="change-password">
                    <h2>Change Your Password</h2>
                    <form action="#" method="POST">
                        <label for="password">Current Password</label>
                        <input type="password" name="password" id="password" placeholder="Enter your current password">
                        <label for="confirmpassword">Confirm Password</label>
                        <input type="password" name="confirmpassword" id="confirmpassword" placeholder="Re-enter your current password">
                        <label for="newpassword">New Password</label>
                        <input type="password" name="newpassword" id="newpassword" placeholder="Enter your new password">
                        <button type="submit">Save Changes</button>
                    </form>
                </section>
            </div>
        </main>
    </div>
</body>

</html>
