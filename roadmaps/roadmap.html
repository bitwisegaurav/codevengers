    <section id="frame"></section>
</body>
<script>
    const frame = document.querySelector('#frame');
    const title = document.querySelector('#title');
    const roadmapData = {
        webdevelopment : {
            name : "Web Development",
            markdown: "webdev",
            image: [],
        }
    }

    const path = new URLSearchParams(window.location.search);
    
    function loadData(){
        const roadmap = path.get('roadmap');
        if(roadmap){
            const data = roadmapData[roadmap];
            if(data){
                title.innerHTML = data.name + " Roadmap";
                getData(data.markdown);
            }
        }
    }

        //         console.error('Error fetching element:', error.message);
        //     }
            loadData()
    });

    function getData(markdown){
        fetch(`${markdown}.md`).then(res => {
            return res.text();
        }).then(res => {
            const data = res;
            frame.innerHTML = marked(data);
            // console.log(data);
        })
        .catch(err => {
            console.log(err);
        })
    }
</script>
