<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/marked@3.0.7/marked.min.js"></script>
    <link rel="stylesheet" href="../common_files/comingsoon.css">
    <link rel="stylesheet" href="../common_files/inner.css">
    <title>Roadmaps - Codevengers</title>
    <style>
        body{
            /* text-align: initial; */
            height: max-content;
        }
        iframe, #frame {
            /* overflow: scroll; */
            text-align: left;
        }
        #frame {
            width: 100%;
            max-width: 65rem;
            /* width: 100%; */
            /* height: max(100%, 50vh); */
            /* height: 50vh; */
            /* background-color: red; */
        }
        .roadmap {
            flex-direction: column;
            gap: 2rem;
        }
        h2 {
            padding: 1rem;
            border-radius: 15px;
            border: 1px solid;
            text-align: center;
        }
        .dark h2{
            border-color: rgba(255,255,255,0.6);
        }
    </style>
</head>
<body>
    <!-- <iframe src="webdev.md" frameborder="0" name="roadmap" title="Roadmap frame"></iframe> -->
    <h1 id="title"></h1>
    <section id="frame"></section>
</body>
<script>
    const frame = document.querySelector('#frame');
    const title = document.querySelector('#title');
    const roadmapData = {
        webdevelopment : {
            name : "Web Development",
            markdown: "webdev",
            class: "roadmap",
            image: ['webdev.jpeg'],
        }
    }

    const path = new URLSearchParams(window.location.search);
    
    function loadData(){
        const roadmap = path.get('roadmap');
        if(roadmap){
            const data = roadmapData[roadmap];
            if(data){
                title.innerHTML = data.name + " Roadmap";
                let images = '';
                data.image.forEach(image => {
                    images += `<div class="${data.class}"><img src="../examples/roadmaps/${image}" alt="${data.name}"></div>`;
                });
                const imagesBox = document.createElement('div');
                imagesBox.innerHTML = images;
                title.insertAdjacentElement("afterend", imagesBox);
                getData(data.markdown);
            }
        }
    }

    window.addEventListener("load", () => {
            loadData()
    });

    function getData(markdown){
        fetch(`${markdown}.md`).then(res => {
            return res.text();
        }).then(res => {
            const data = res;
            frame.innerHTML = marked(data);
            // console.log(data);
        })
        .catch(err => {
            console.log(err);
        })
    }
</script>
<script src="../index.js"></script>
</html>
